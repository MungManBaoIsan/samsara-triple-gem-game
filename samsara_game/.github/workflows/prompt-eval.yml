name: Prompt Eval

on:
  push:
    paths:
      - 'prompts/**'
      - 'scripts/eval_runner.py'
  pull_request:
    paths:
      - 'prompts/**'
  workflow_dispatch:
    inputs:
      provider:
        description: 'LLM provider (mock or anthropic)'
        required: false
        default: 'mock'

jobs:
  lint:
    name: Lint prompt structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check every prompt has required files
        run: |
          failed=0
          for dir in prompts/*/; do
            name=$(basename "$dir")
            # Skip hidden dirs like .fixtures
            [[ "$name" == .* ]] && continue
            for f in prompt.md REASONING.md rubric.yaml; do
              if [ ! -f "$dir$f" ]; then
                echo "MISSING: $dir$f"
                failed=1
              fi
            done
          done
          exit $failed

      - name: Check no unfilled placeholders remain
        run: |
          if grep -r '{{' prompts/ --include='*.md' --include='*.yaml' -l; then
            echo "ERROR: unfilled {{placeholder}} strings found above"
            exit 1
          fi
          echo "No unfilled placeholders found"

      - name: Check YAML validity
        run: |
          pip install pyyaml -q
          python3 -c "
          import yaml, sys, pathlib
          errors = []
          for f in pathlib.Path('prompts').rglob('*.yaml'):
              try:
                  yaml.safe_load(f.read_text())
              except yaml.YAMLError as e:
                  errors.append(f'{f}: {e}')
          if errors:
              print('\n'.join(errors))
              sys.exit(1)
          print(f'All YAML files valid ({len(list(pathlib.Path(\"prompts\").rglob(\"*.yaml\")))} checked)')
          "

      - name: Check README indexes all prompts
        run: |
          python3 -c "
          import pathlib, sys
          readme = pathlib.Path('prompts/README.md').read_text()
          prompt_dirs = [d.name for d in pathlib.Path('prompts').iterdir()
                         if d.is_dir() and not d.name.startswith('.')]
          missing = [p for p in prompt_dirs if p not in readme]
          if missing:
              print('Prompts not in README index:', missing)
              sys.exit(1)
          print('All prompts indexed in README')
          "

  eval:
    name: Run rubric evaluations
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run eval (mock provider)
        run: |
          python scripts/eval_runner.py \
            --provider mock \
            --fail-under 0.8

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-results
          path: prompts/**/results/

      - name: Run eval with real API (manual only)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.provider == 'anthropic'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          pip install anthropic
          python scripts/eval_runner.py \
            --provider anthropic \
            --fail-under 0.8
